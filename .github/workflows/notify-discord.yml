name: Publish Discord Release Notification

on:
  workflow_call:
    inputs:
      mod_name:
        description: "The display name of the mod."
        required: true
        type: string
      version:
        description: "The release version to display."
        required: true
        type: string
      changelog:
        description: "The changelog text for the embed description."
        required: false
        type: string
        default: ""
      modrinth_game_version:
        description: "Target Minecraft version string shown in the embed."
        required: false
        type: string
        default: ""
      modrinth_id:
        description: "Modrinth project ID for the download link."
        required: false
        type: string
        default: ""
      fabric_loader_version:
        description: "Fabric loader version for this release."
        required: false
        type: string
        default: ""
      neoforge_loader_version:
        description: "NeoForge loader version for this release."
        required: false
        type: string
        default: ""
      discord_icon_url:
        description: "Optional icon URL used as the embed thumbnail."
        required: false
        type: string
        default: ""
      github_release_url:
        description: "Optional GitHub release URL override."
        required: false
        type: string
        default: ""
      webhook_username:
        description: "Display name for the Discord webhook message."
        required: false
        type: string
        default: "Matthiesen Release Bot"
      webhook_avatar_url:
        description: "Avatar URL for the Discord webhook message."
        required: false
        type: string
        default: "https://raw.githubusercontent.com/Matthiesen-dev/.github/refs/heads/main/logo-transparent.png"
      discord_embed_color:
        description: "Decimal color code for the Discord embed (default is a shade of green)."
        required: false
        type: string
        default: "5763719"
    secrets:
      discord_webhook_url:
        description: "Discord webhook URL."
        required: true

jobs:
  send_discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Build Discord Embed Payload
        id: build_payload
        uses: matthiesen-dev/automation/.github/actions/build-discord-payload@main
        with:
          mod_name: ${{ inputs.mod_name }}
          version: ${{ inputs.version }}
          changelog: ${{ inputs.changelog }}
          modrinth_game_version: ${{ inputs.modrinth_game_version }}
          modrinth_id: ${{ inputs.modrinth_id }}
          fabric_loader_version: ${{ inputs.fabric_loader_version }}
          neoforge_loader_version: ${{ inputs.neoforge_loader_version }}
          discord_icon_url: ${{ inputs.discord_icon_url }}
          github_release_url: ${{ inputs.github_release_url }}
          webhook_username: ${{ inputs.webhook_username }}
          webhook_avatar_url: ${{ inputs.webhook_avatar_url }}
          discord_embed_color: ${{ inputs.discord_embed_color }}

      - name: Send Discord Notification
        uses: matthiesen-dev/automation/.github/actions/send-discord-payload@main
        with:
          payload: ${{ steps.build_payload.outputs.payload }}
          discord_webhook_url: ${{ secrets.discord_webhook_url }}
