name: Prepare Publishing

on:
  workflow_call:
    inputs:
      tag_name:
        description: "The tag name to parse the version from."
        required: true
        type: string
      java_version:
        description: "The Java version to use for the release preparation."
        required: false
        type: string
        default: "21"
      java_distribution:
        description: "The Java distribution to use for the release preparation."
        required: false
        type: string
        default: "temurin"
    secrets:
      git_token:
        description: "GitHub token for authentication (automatically provided by GitHub)."
        required: true
    outputs:
      version:
        description: "The parsed version from the tag name."
        value: ${{ jobs.parse.outputs.version }}
      is_snapshot:
        description: "Indicates if the version is a snapshot version."
        value: ${{ jobs.parse.outputs.is_snapshot }}
      embed_color:
        description: "Decimal color code for the Discord embed based on version type (release, beta, alpha)."
        value: ${{ jobs.parse.outputs.embed_color }}

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse_version.outputs.version }}
      is_snapshot: ${{ steps.parse_version.outputs.is_snapshot }}
      embed_color: ${{ steps.parse_version.outputs.embed_color }}
    steps:
      - name: Parse Version
        id: parse_version
        uses: matthiesen-dev/automation/.github/actions/parse-version@main
        with:
          tag_name: ${{ inputs.tag_name }}

      - name: Prepare release artifacts
        uses: matthiesen-dev/automation/.github/actions/prepare-release@main
        with:
          tag_name: ${{ inputs.tag_name }}
          version: ${{ steps.parse_version.outputs.version }}
          token: ${{ secrets.git_token }}
          java_version: ${{ inputs.java_version }}
          java_distribution: ${{ inputs.java_distribution }}
