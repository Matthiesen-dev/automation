name: Build and publish Minecraft Datapack/Resourcepack

on:
  workflow_call:
    inputs:
      tag_name:
        description: "The tag name to parse the version from."
        required: true
        type: string
        default: ""
      mod_name:
        description: "The name of the mod to build."
        type: string
        required: true
      datapack_loader:
        description: "Indicates if this release is for a datapack (true/false). Affects the platforms field in the embed."
        required: false
        type: string
        default: "false"
      resourcepack_loader:
        description: "Indicates if this release is for a resourcepack (true/false). Affects the platforms field in the embed."
        required: false
        type: string
        default: "false"
      changelog:
        description: "The changelog to include in the Modrinth release."
        required: true
        type: string
      modrinth_game_version:
        description: "The game version to target on Modrinth."
        required: true
        type: string
      modrinth_id:
        description: "The Modrinth project ID to publish to."
        required: true
        type: string
      modrinth_dependencies:
        description: "The dependencies to set for the Modrinth release (in JSON format)."
        required: false
        type: string
        default: "[]"
      github_release_url:
        description: "Optional GitHub release URL override."
        required: false
        type: string
      discord_icon_url:
        description: "Optional icon URL used as the embed thumbnail."
        required: false
        type: string
    secrets:
      git_token:
        description: "GitHub token for authentication (automatically provided by GitHub)."
        required: true
      MODRINTH_TOKEN:
        description: "The Modrinth API token to use for authentication."
        required: true
      DISCORD_WEBHOOK_URL:
        description: "Discord webhook URL for release notifications."
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Set up project environment
        uses: matthiesen-dev/automation/.github/actions/datapack-project-setup@main

      - name: Parse version
        id: parse_version
        uses: matthiesen-dev/automation/.github/actions/parse-version@main
        with:
          tag_name: ${{ inputs.tag_name }}

      - name: Build Minecraft Datapack/Resourcepack
        uses: matthiesen-dev/automation/.github/actions/build-datapack@main
        with:
          project_name: ${{ inputs.mod_name }}
          version: ${{ steps.parse_version.outputs.version }}

      - name: Upload Release Artifacts to Github Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          files: |-
            ${{ inputs.mod_name }}-${{ steps.parse_version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.git_token }}

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ inputs.modrinth_id }}
          name: ${{ format('{0} {1}', inputs.mod_name, steps.parse_version.outputs.version) }}
          version: ${{ steps.parse_version.outputs.version }}
          changelog: ${{ inputs.changelog }}
          loaders: ${{ inputs.datapack_loader == 'true' && 'datapack' || '' }}${{ inputs.resourcepack_loader == 'true' && inputs.datapack_loader == 'true' && ',' || '' }}${{ inputs.resourcepack_loader == 'true' && 'minecraft' || '' }}
          game-versions: ${{ inputs.modrinth_game_version }}
          dependencies: ${{ inputs.modrinth_dependencies }}
          files: ${{ inputs.mod_name }}-${{ steps.parse_version.outputs.version }}.zip
