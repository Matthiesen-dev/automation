name: Determine Dependencies
description: "Determines the dependencies for the release based on the provided inputs and sets them as outputs for use in subsequent steps."

inputs:
  base_dependencies:
    description: "The base dependencies to set for the Modrinth release (in JSON format)."
    required: true
    default: "[]"
  extra_dependencies:
    description: "Additional dependencies to include (in JSON format). These will be merged with the base dependencies."
    required: false
    default: "[]"

outputs:
  merged_dependencies:
    description: "The merged dependencies in JSON format, combining base and extra dependencies."
    value: ${{ steps.merge.outputs.merged_dependencies }}

runs:
  using: composite
  steps:
    - name: Merge Dependencies
      id: merge
      shell: bash
      run: |
        set -euo pipefail

        normalize_dependencies() {
          local raw="$1"
          local compact
          local sanitized

          # Empty input should behave as an empty dependency list.
          if [ -z "$raw" ]; then
            echo "[]"
            return 0
          fi

          # First, try strict JSON.
          if compact=$(echo "$raw" | jq -c . 2>/dev/null); then
            echo "$compact"
            return 0
          fi

          # Fallback: accept relaxed object notation such as:
          # [{project_id:MdwFAVRL,dependency_type:required}]
          sanitized=$(echo "$raw" | tr -d '\r')
          sanitized=$(echo "$sanitized" | sed -E 's/([{,][[:space:]]*)([A-Za-z_][A-Za-z0-9_-]*)([[:space:]]*:)/\1"\2"\3/g')
          sanitized=$(echo "$sanitized" | sed -E 's/:[[:space:]]*([A-Za-z_][A-Za-z0-9_.-]*)([[:space:]]*[,}])/ :"\1"\2/g')

          if compact=$(echo "$sanitized" | jq -c . 2>/dev/null); then
            echo "$compact"
            return 0
          fi

          echo "Invalid dependency JSON input: $raw" >&2
          return 1
        }

        echo "Base dependencies: ${{ inputs.base_dependencies }}"
        echo "Extra dependencies: ${{ inputs.extra_dependencies }}"

        base_normalized=$(normalize_dependencies '${{ inputs.base_dependencies }}')
        extra_normalized=$(normalize_dependencies '${{ inputs.extra_dependencies }}')

        if [ "$extra_normalized" != "[]" ]; then
          if [ "$base_normalized" != "[]" ]; then
            # Merge base and extra dependencies, then keep compact JSON for outputs.
            merged=$(jq -c -s 'add | unique' <(echo "$base_normalized") <(echo "$extra_normalized"))
          else
            merged="$extra_normalized"
          fi
        else
          merged="$base_normalized"
        fi

        # Set the merged dependencies as an output
        echo "Merged dependencies: $merged"
        echo "merged_dependencies=$merged" >> "$GITHUB_OUTPUT"
