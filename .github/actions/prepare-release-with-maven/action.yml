name: Prepare Release with Maven Publishing (maven.matthiesen.dev repository)
description: Prepares the release by parsing the version and setting it as an output variable.

inputs:
  version:
    description: "The parsed version from the tag name."
    required: true
    default: ""
  artifact_prefix:
    description: "The prefix for the release artifacts."
    required: false
    default: "release-jars"
  java_version:
    description: "The Java version to use for the release preparation."
    required: false
    default: "21"
  java_distribution:
    description: "The Java distribution to use for the release preparation."
    required: false
    default: "temurin"
  token:
    description: "The GitHub token to use for authentication when uploading artifacts."
    required: true
    default: ""
  maven_username:
    description: "The username for authenticating with the maven.matthiesen.dev repository."
    required: true
    default: ""
  maven_password:
    description: "The password for authenticating with the maven.matthiesen.dev repository."
    required: true
    default: ""

runs:
  using: composite
  steps:
    - name: Project Setup
      uses: matthiesen-dev/automation/.github/actions/java-project-setup@main
      with:
        java_version: ${{ inputs.java_version }}
        java_distribution: ${{ inputs.java_distribution }}

    - name: Build and Publish with Gradle to maven.matthiesen.dev
      shell: bash
      run: ./gradlew build publishAllPublicationsToDevMatthiesenMavenRepository
      env:
        RELEASE_VERSION: ${{ inputs.version }}
        ORG_GRADLE_PROJECT_devMatthiesenMavenUsername: ${{ inputs.maven_username }}
        ORG_GRADLE_PROJECT_devMatthiesenMavenPassword: ${{ inputs.maven_password }}

    - name: Copy Jars for Release
      shell: bash
      run: ./gradlew copyJars

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_prefix }}-${{ inputs.version }}
        path: output/*.jar

    - name: Upload Release Artifacts to Github Release
      uses: softprops/action-gh-release@v1
      with:
        files: output/*.jar
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
