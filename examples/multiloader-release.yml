# Multiloader Release Example
#
# Use this pattern when your mod ships both Fabric and NeoForge jars in a single release.
# prepare-publishing handles tag parsing and the Gradle build/upload in one step.
# publish-modrinth-multiloader then publishes both loaders via a matrix job.
#
# Required repository secrets:
#   MODRINTH_TOKEN       - Modrinth API token
#   DISCORD_WEBHOOK_URL  - Discord incoming webhook URL

name: Release

on:
  release:
    types: [published]

jobs:
  prepare:
    uses: Matthiesen-dev/automation/.github/workflows/prepare-publishing.yml@main
    with:
      tag_name: ${{ github.event.release.tag_name }}
    secrets:
      git_token: ${{ secrets.GITHUB_TOKEN }}

  publish_modrinth:
    needs: prepare
    uses: Matthiesen-dev/automation/.github/workflows/publish-modrinth-multiloader.yml@main
    with:
      artifact_basename: my-mod
      mod_name: My Mod
      version: ${{ needs.prepare.outputs.version }}
      changelog: ${{ github.event.release.body }}
      modrinth_game_version: "1.21.1"
      modrinth_id: your-modrinth-project-id
      # Optional overrides:
      # artifact_prefix: release-jars
      # modrinth_dependencies: '[{"project_id":"P7dR8mSH","dependency_type":"required"}]'
      # readme_path: README.md
    secrets:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

  notify_discord:
    needs: [prepare, publish_modrinth]
    uses: Matthiesen-dev/automation/.github/workflows/publish-discord-release.yml@main
    with:
      mod_name: My Mod
      version: ${{ needs.prepare.outputs.version }}
      changelog: ${{ github.event.release.body }}
      modrinth_game_version: "1.21.1"
      modrinth_id: your-modrinth-project-id
      fabric_loader_version: "0.16.x"
      neoforge_loader_version: "21.x"
      # Optional overrides:
      # discord_icon_url: https://example.com/icon.png
      # webhook_username: My Release Bot
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
